<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  <style>
    .site-nav {
      background: #159957;
      background: linear-gradient(120deg, #155799, #159957);
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.12);
    }

    .site-nav-inner {
      max-width: 64rem;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .site-nav a,
    .site-nav button {
      color: rgba(255, 255, 255, 0.92);
      font: 600 0.95rem/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      text-decoration: none;
    }

    .site-nav a:hover,
    .site-nav button:hover {
      color: #fff;
      text-decoration: underline;
    }

    .site-nav button {
      margin-left: auto;
      padding: 0;
      cursor: pointer;
      background: none;
      border: 0;
    }

    .main-content h1:first-child {
      margin-top: 0;
    }

    .blog-list {
      padding-left: 1.2rem;
      font-size: 1.1rem;
    }

    figure {
      margin: 1.5rem 0;
      text-align: center;
    }

    figure img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 6px;
    }

    figcaption {
      margin-top: 0.5rem;
      color: #606c71;
      font-size: 0.9rem;
      text-align: center;
    }

    [data-lang] {
      display: none;
    }
  </style>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["\\(", "\\)"]],
        displayMath: [["\\[", "\\]"]]
      }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
  <nav class="site-nav" aria-label="Main navigation">
    <div class="site-nav-inner">
      <a href="{{ '/' | relative_url }}" data-en="Home" data-zh="主页">Home</a>
      <a href="{{ '/blogs/' | relative_url }}" data-en="Blogs" data-zh="博客">Blogs</a>
      <button id="language-toggle" type="button" aria-label="Switch language">中文</button>
    </div>
  </nav>

  <main class="main-content" role="main">
    {{ content }}
  </main>

  <script>
    const toggle = document.getElementById("language-toggle");
    let currentLanguage = "en";

    function setLanguage(language) {
      currentLanguage = language;
      document.documentElement.lang = currentLanguage === "en" ? "en" : "zh-CN";
      toggle.textContent = currentLanguage === "en" ? "中文" : "English";

      document.querySelectorAll("[data-en][data-zh]").forEach((element) => {
        element.textContent = element.dataset[currentLanguage];
      });

      document.querySelectorAll("[data-lang]").forEach((element) => {
        element.style.display = element.dataset.lang === currentLanguage ? "block" : "none";
      });
    }

    setLanguage(currentLanguage);

    toggle.addEventListener("click", () => {
      setLanguage(currentLanguage === "en" ? "zh" : "en");
    });
  </script>
</body>
</html>
