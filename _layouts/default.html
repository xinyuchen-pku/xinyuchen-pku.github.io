<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  <style>
    .site-nav {
      background: #159957;
      background: linear-gradient(120deg, #155799, #159957);
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.12);
    }

    .site-nav-inner {
      max-width: 64rem;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .site-nav a,
    .site-nav button {
      color: rgba(255, 255, 255, 0.92);
      font: 600 0.95rem/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      text-decoration: none;
    }

    .site-nav a:hover,
    .site-nav button:hover {
      color: #fff;
      text-decoration: underline;
    }

    .site-nav button {
      margin-left: auto;
      padding: 0;
      cursor: pointer;
      background: none;
      border: 0;
    }

    .main-content h1:first-child {
      margin-top: 0;
    }

    .main-content h2,
    .main-content h3,
    .main-content h4 {
      scroll-margin-top: 5rem;
    }

    .blog-list {
      padding-left: 1.2rem;
      font-size: 1.1rem;
    }

    figure {
      margin: 1.5rem 0;
      text-align: center;
    }

    figure img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 6px;
    }

    figcaption {
      margin-top: 0.5rem;
      color: #606c71;
      font-size: 0.9rem;
      text-align: center;
    }

    .figure-row {
      display: grid;
      grid-template-columns: minmax(0, 0.85fr) minmax(0, 1.75fr);
      gap: 1.25rem;
      align-items: start;
    }

    .figure-row.equal {
      display: block;
    }

    .figure-row figure {
      margin: 1.5rem 0;
      display: flex;
      align-items: center;
      flex-direction: column;
    }

    .figure-row img {
      width: auto;
      max-width: 100%;
      height: 20rem;
      object-fit: contain;
    }

    .figure-row.equal figure {
      margin: 1.5rem auto;
      justify-content: flex-start;
    }

    .figure-row.equal img {
      width: auto;
      max-width: 100%;
      height: auto;
    }

    @media (max-width: 800px) {
      .figure-row {
        grid-template-columns: 1fr;
      }

      .figure-row img,
      .figure-row.equal img {
        height: auto;
      }
    }

    [data-lang] {
      display: none;
    }

    .floating-toc {
      position: fixed;
      top: 5.5rem;
      right: 1rem;
      width: 15rem;
      max-height: calc(100vh - 7rem);
      padding: 1rem;
      overflow: auto;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #dce6f0;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      font-size: 0.9rem;
      z-index: 10;
    }

    .floating-toc-title {
      margin: 0 0 0.6rem;
      color: #155799;
      font-weight: 700;
    }

    .floating-toc ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .floating-toc li {
      margin: 0.35rem 0;
      line-height: 1.35;
    }

    .floating-toc a {
      color: #606c71;
      text-decoration: none;
    }

    .floating-toc a:hover {
      color: #159957;
      text-decoration: underline;
    }

    .floating-toc .toc-h3 {
      padding-left: 0.8rem;
    }

    .floating-toc .toc-h4 {
      padding-left: 1.6rem;
      font-size: 0.85rem;
    }

    @media (max-width: 1200px) {
      .floating-toc {
        display: none;
      }
    }
  </style>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["\\(", "\\)"]],
        displayMath: [["\\[", "\\]"]]
      }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
  <nav class="site-nav" aria-label="Main navigation">
    <div class="site-nav-inner">
      <a href="{{ '/' | relative_url }}" data-en="Home" data-zh="主页">Home</a>
      <a href="{{ '/blogs/' | relative_url }}" data-en="Blogs" data-zh="博客">Blogs</a>
      <button id="language-toggle" type="button" aria-label="Switch language">中文</button>
    </div>
  </nav>

  <main class="main-content" role="main">
    {{ content }}
  </main>

  <aside class="floating-toc" aria-label="Table of contents">
    <p class="floating-toc-title" data-en="Contents" data-zh="目录">Contents</p>
    <ul id="floating-toc-list"></ul>
  </aside>

  <script>
    const toggle = document.getElementById("language-toggle");
    const tocList = document.getElementById("floating-toc-list");
    let currentLanguage = "en";

    function slugify(text, index) {
      return `section-${currentLanguage}-${index}-${text
        .trim()
        .toLowerCase()
        .replace(/[^\p{L}\p{N}]+/gu, "-")
        .replace(/^-+|-+$/g, "")}`;
    }

    function rebuildToc() {
      if (!tocList) {
        return;
      }

      tocList.innerHTML = "";
      const activeArticle = document.querySelector(`[data-lang="${currentLanguage}"]`);
      const scope = activeArticle || document.querySelector(".main-content");
      const headings = Array.from(scope.querySelectorAll("h2, h3, h4"));

      headings.forEach((heading, index) => {
        if (!heading.id) {
          heading.id = slugify(heading.textContent, index);
        }

        const item = document.createElement("li");
        item.className = `toc-${heading.tagName.toLowerCase()}`;

        const link = document.createElement("a");
        link.href = `#${heading.id}`;
        link.textContent = heading.textContent;

        item.appendChild(link);
        tocList.appendChild(item);
      });
    }

    function setLanguage(language) {
      currentLanguage = language;
      document.documentElement.lang = currentLanguage === "en" ? "en" : "zh-CN";
      toggle.textContent = currentLanguage === "en" ? "中文" : "English";

      document.querySelectorAll("[data-en][data-zh]").forEach((element) => {
        element.textContent = element.dataset[currentLanguage];
      });

      document.querySelectorAll("[data-lang]").forEach((element) => {
        element.style.display = element.dataset.lang === currentLanguage ? "block" : "none";
      });

      rebuildToc();
    }

    setLanguage(currentLanguage);

    toggle.addEventListener("click", () => {
      setLanguage(currentLanguage === "en" ? "zh" : "en");
    });
  </script>
</body>
</html>
